<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aryan Khare — Discipline OS</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --black:#0a0a0a; --surface:#111; --card:#181818; --border:#242424;
    --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.12); --gold-mid:rgba(201,168,76,0.35);
    --text:#e8e4da; --muted:#666; --success:#4caf7d;
    --topbar:rgba(10,10,10,0.95);
    --mono:'Space Mono',monospace; --sans:'Space Grotesk',sans-serif;
  }
  body[data-mode="light"] {
    --black:#f4f2ec; --surface:#ffffff; --card:#fafaf8; --border:#e0ddd4;
    --text:#1a1a1a; --muted:#777; --success:#2d8a5e;
    --topbar:rgba(244,242,236,0.95);
  }
  body[data-accent="gold"][data-mode="dark"] { --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.12); --gold-mid:rgba(201,168,76,0.35); }
  body[data-accent="gold"][data-mode="light"] { --gold:#9a7828; --gold-dim:rgba(154,120,40,0.14); --gold-mid:rgba(154,120,40,0.35); }
  body[data-accent="ocean"][data-mode="dark"] { --gold:#5c8dd6; --gold-dim:rgba(92,141,214,0.12); --gold-mid:rgba(92,141,214,0.35); }
  body[data-accent="ocean"][data-mode="light"] { --gold:#3a6db8; --gold-dim:rgba(58,109,184,0.14); --gold-mid:rgba(58,109,184,0.35); }
  body[data-accent="forest"][data-mode="dark"] { --gold:#4caf7d; --gold-dim:rgba(76,175,125,0.12); --gold-mid:rgba(76,175,125,0.35); }
  body[data-accent="forest"][data-mode="light"] { --gold:#2d8a5e; --gold-dim:rgba(45,138,94,0.14); --gold-mid:rgba(45,138,94,0.35); }
  body[data-accent="rose"][data-mode="dark"] { --gold:#d4649a; --gold-dim:rgba(212,100,154,0.12); --gold-mid:rgba(212,100,154,0.35); }
  body[data-accent="rose"][data-mode="light"] { --gold:#b8437a; --gold-dim:rgba(184,67,122,0.14); --gold-mid:rgba(184,67,122,0.35); }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--text);font-family:var(--sans);min-height:100vh;padding:0 0 80px 0;}

  .topbar{display:flex;align-items:center;gap:12px;padding:10px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--topbar);backdrop-filter:blur(14px);z-index:100;}
  .topbar-left{flex-shrink:0;min-width:120px;}
  .topbar-nav{flex:1;display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none;min-width:0;padding:2px 0;}
  .topbar-nav::-webkit-scrollbar{display:none;}
  .topbar-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
  .topbar-actions{display:flex;align-items:center;gap:8px;}
  .logo-name{font-family:var(--mono);font-size:15px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:opacity .15s;}
  .logo-name:hover{opacity:0.8;}
  .logo-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase;}
  .date-badge{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;white-space:nowrap;}
  .theme-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;flex-shrink:0;}
  .theme-btn:hover,.theme-btn.open{border-color:var(--gold-mid);background:var(--gold-dim);}
  .theme-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .theme-popover{position:fixed;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:0 10px 40px rgba(0,0,0,0.35);min-width:230px;display:none;}
  .theme-popover.open{display:block;}
  .theme-popover-title{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px;}

  .hero-row{display:flex;align-items:center;justify-content:center;gap:0;padding:28px 40px 16px;max-width:900px;margin:0 auto;width:100%;}
  .hero-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;}
  .ring-stats-row{display:flex;align-items:center;gap:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .ring-stat-item{display:flex;flex-direction:column;align-items:center;padding:10px 20px;}
  .ring-stat-divider{width:1px;height:36px;background:var(--border);}
  .ring-stat-val{font-family:var(--mono);font-size:18px;color:var(--text);font-weight:700;}
  .ring-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:1px;}
  .hero-divider{width:1px;height:160px;background:var(--border);flex-shrink:0;margin:0 32px;}
  .hero-streak-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
  .streak-fire{font-size:32px;}
  .streak-num{font-family:var(--mono);font-size:64px;font-weight:700;color:var(--gold);line-height:1;text-shadow:0 0 40px rgba(201,168,76,0.5);}
  .streak-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.18em;}
  .streak-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;}

  .quote-banner{margin:10px auto 0;padding:12px 20px;background:var(--gold-dim);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;max-width:860px;width:calc(100% - 40px);}
  .quote-text{font-size:12px;color:var(--text);font-style:italic;line-height:1.55;}
  .quote-author{font-family:var(--mono);font-size:9px;color:var(--gold);margin-top:4px;}

  .ring-section{display:flex;align-items:center;justify-content:center;gap:24px;padding:14px 24px 0;}
  .ring-wrap{position:relative;width:130px;height:130px;flex-shrink:0;}
  .ring-svg{width:130px;height:130px;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:12;}
  .ring-fill{fill:none;stroke:var(--gold);stroke-width:12;stroke-linecap:round;stroke-dasharray:345;stroke-dashoffset:345;transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);filter:drop-shadow(0 0 7px rgba(201,168,76,0.55));}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-count{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--gold);line-height:1;}
  .ring-label{font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
  .ring-goal{font-family:var(--mono);font-size:9px;color:var(--muted);}
  .ring-stats{display:flex;flex-direction:column;gap:10px;}
  .ring-stat-val{font-family:var(--mono);font-size:18px;color:var(--text);font-weight:700;}
  .ring-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}

  .goals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 40px 0;max-width:900px;margin:0 auto;width:100%;}
  .mini-goal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 11px;display:flex;flex-direction:column;gap:5px;}
  .mini-goal-top{display:flex;align-items:center;justify-content:space-between;}
  .mini-goal-emoji{font-size:18px;}
  .mini-goal-status{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:10px;text-transform:uppercase;}
  .mini-goal-status.active{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-mid);}
  .mini-goal-status.done{background:rgba(76,175,125,0.12);color:var(--success);border:1px solid rgba(76,175,125,0.3);}
  .mini-goal-title{font-size:11px;font-weight:600;line-height:1.3;}
  .mini-goal-bar-wrap{background:var(--border);border-radius:3px;height:3px;}
  .mini-goal-bar{height:3px;background:var(--gold);border-radius:3px;transition:width 0.6s ease;}
  .mini-goal-val{font-family:var(--mono);font-size:9px;color:var(--muted);}

  .tabs{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none;}
  .theme-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .theme-row:last-child{margin-bottom:0;}
  .theme-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;min-width:52px;}
  .theme-chip{padding:5px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s;}
  .theme-chip.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;}
  .theme-chip.accent-gold{border-color:#c9a84c;}
  .theme-chip.accent-ocean{border-color:#5c8dd6;}
  .theme-chip.accent-forest{border-color:#4caf7d;}
  .theme-chip.accent-rose{border-color:#d4649a;}
  .cal-month-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
  .cal-stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
  .cal-stat-title{font-size:11px;font-weight:600;margin-bottom:4px;}
  .cal-stat-val{font-family:var(--mono);font-size:13px;color:var(--gold);}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:6px 10px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);cursor:pointer;border:none;border-radius:6px;transition:all 0.2s;background:transparent;white-space:nowrap;flex-shrink:0;}
  .tab.active{color:var(--gold);background:var(--gold-dim);}

  .panel{display:none;padding:18px 40px;max-width:900px;margin:0 auto;width:100%;}
  .panel.active{display:block;}
  .section-title{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:13px;}

  .checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
  .check-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 13px;cursor:pointer;transition:all 0.18s;user-select:none;}
  .check-item:active{transform:scale(0.99);}
  .check-item.done{border-color:var(--gold-mid);background:var(--gold-dim);}
  .check-icon{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s;font-size:11px;}
  .check-item.done .check-icon{background:var(--gold);border-color:var(--gold);color:#000;}
  .check-text{flex:1;}
  .check-name{font-size:13px;font-weight:500;}
  .check-desc{font-size:10px;color:var(--muted);margin-top:1px;}
  .check-emoji{font-size:18px;}

  .diary-grid{display:flex;flex-direction:column;gap:11px;margin-bottom:22px;}
  .diary-field{display:flex;flex-direction:column;gap:5px;}
  .diary-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
  .diary-input{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;resize:none;outline:none;transition:border-color 0.2s;}
  .diary-input:focus{border-color:var(--gold-mid);}
  .diary-input::placeholder{color:var(--muted);}

  .btn-save{width:100%;padding:14px;background:var(--gold);color:#000;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;transition:opacity 0.2s;}
  .btn-save:hover{opacity:0.88;}
  .btn-secondary{width:100%;padding:10px;margin-top:8px;background:transparent;color:var(--gold);font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;border:1px solid var(--gold-mid);border-radius:10px;cursor:pointer;transition:background 0.2s;}
  .btn-secondary:hover{background:var(--gold-dim);}
  .btn-gcal{width:100%;padding:10px;margin-top:6px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;border:1px dashed var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s;}
  .btn-gcal:hover{border-color:var(--gold-mid);color:var(--gold);}

  .goals-list{display:flex;flex-direction:column;gap:12px;}
  .goal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .goal-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .goal-emoji{font-size:22px;}
  .goal-title{font-size:14px;font-weight:600;flex:1;}
  .goal-status{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:0.08em;}
  .goal-status.active{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-mid);}
  .goal-status.done{background:rgba(76,175,125,0.12);color:var(--success);border:1px solid rgba(76,175,125,0.3);}
  .goal-bar-wrap{background:var(--border);border-radius:4px;height:4px;overflow:hidden;}
  .goal-bar{height:4px;background:var(--gold);border-radius:4px;transition:width 0.6s ease;}
  .goal-note{font-size:11px;color:var(--muted);margin-top:8px;}

  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:border-color 0.2s;}
  .cal-nav-btn:hover{border-color:var(--gold-mid);color:var(--gold);}
  .cal-month-title{font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;}
  .days-header{display:flex;gap:5px;margin-bottom:5px;padding-left:35px;}
  .days-header span{width:38px;text-align:center;font-family:var(--mono);font-size:8px;color:var(--muted);flex-shrink:0;}
  .week-grid{display:flex;flex-direction:column;gap:5px;}
  .week-row{display:flex;gap:5px;align-items:center;}
  .week-label{font-family:var(--mono);font-size:9px;color:var(--muted);width:30px;flex-shrink:0;}
  .day-dot{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--muted);transition:all 0.18s;flex-shrink:0;}
  .day-dot:hover:not(.future):not(.empty){border-color:var(--gold-mid);}
  .day-dot.productive{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
  .day-dot.partial{background:rgba(201,168,76,0.22);border-color:var(--gold-mid);color:var(--gold);}
  .day-dot.today{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-mid);}
  .day-dot.future{opacity:0.2;cursor:default;}
  .day-dot.empty{opacity:0;cursor:default;pointer-events:none;}
  .cal-legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
  .legend-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
  .cal-prod-count{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:10px;text-align:center;}

  .history-entry{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:9px;}
  .history-date{font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:5px;}
  .history-checks{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
  .history-chip{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-mid);}
  .history-note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:2px;}
  .no-history{text-align:center;padding:40px;color:var(--muted);font-size:13px;}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#000;font-family:var(--mono);font-size:12px;padding:9px 20px;border-radius:24px;font-weight:700;letter-spacing:0.08em;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .divider{height:1px;background:var(--border);margin:18px 0;}

  @media(max-width:380px){.day-dot{width:33px;height:33px;}.days-header span{width:33px;}.goals-grid{padding:12px 14px 0;}.hero-row{padding:20px 16px 12px;gap:0;}.hero-divider{margin:0 16px;}.panel{padding:14px 16px;}.topbar{padding:10px 12px;gap:8px;}.topbar-left{min-width:90px;}.logo-name{font-size:12px;}.topbar-nav .tab{padding:5px 7px;font-size:9px;}.quote-banner{margin:10px 16px 0;width:auto;}}
  @media(max-width:600px){.hero-row{padding:20px 20px 12px;}.hero-divider{margin:0 20px;}.panel{padding:16px 20px;}.topbar{padding:10px 16px;}.goals-grid{padding:12px 20px 0;}.quote-banner{margin:10px 20px 0;}}

  .secret-overlay{position:fixed;inset:0;background:var(--black);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .secret-overlay.hidden{display:none;}
  .pin-dots{display:flex;gap:12px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);background:transparent;transition:background .15s;}
  .pin-dot.filled{background:var(--gold);}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px;}
  .pin-btn{padding:18px;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--mono);font-size:20px;cursor:pointer;transition:all .15s;text-align:center;}
  .pin-btn:active{background:var(--gold-dim);border-color:var(--gold);}
  .pin-error{color:#e05252;font-family:var(--mono);font-size:12px;min-height:18px;text-align:center;}
  .pin-title{font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--border);border-radius:2px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--gold);cursor:pointer;}
  .time-input-row{display:flex;gap:8px;margin-top:6px;}
  .time-input-row input[type=time]{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:9px 10px;outline:none;font-family:var(--mono);}
  .time-input-row input[type=time]:focus{border-color:var(--gold-mid);}
  .sleep-display{display:flex;gap:10px;margin-bottom:12px;}
  .sleep-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
  .sleep-card-val{font-family:var(--mono);font-size:20px;color:var(--gold);font-weight:700;}
  .sleep-card-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body data-mode="dark" data-accent="gold">

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-name" onclick="goHome()" title="Go to Home">Aryan Khare</div>
    <div class="logo-sub">Discipline OS &middot; 2026</div>
  </div>
  <div class="topbar-nav tabs">
    <button class="tab" onclick="switchTab('today')">Today</button>
    <button class="tab" onclick="switchTab('calendar')">Calendar</button>
    <button class="tab" onclick="switchTab('goals')">Goals</button>
    <button class="tab" onclick="switchTab('body')">Body</button>
    <button class="tab" onclick="switchTab('tapan')">Tapan</button>
    <button class="tab" onclick="switchTab('money')">Money</button>
    <button class="tab" onclick="switchTab('private')">&#128274;</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>
  <div class="topbar-right">
    <div class="date-badge" id="topDate"></div>

function countCheckForMonth(checkId, year, month) {

  var count = 0;

    if (entry && entry.checks && entry.checks[checkId]) count++;

function timeToDec(t) {
  if (!t) return null;
  var parts = t.split(':');
  return parseInt(parts[0]) + parseInt(parts[1])/60;
}
function calcDuration(start, end) {
  if (!start || !end) return null;
  var s = timeToDec(start), e2 = timeToDec(end);
  if (e2 < s) e2 += 24; // crossed midnight
  return e2 - s;
}
function formatHours(h) {
  if (h === null || isNaN(h)) return '';
  var hrs = Math.floor(h), mins = Math.round((h - hrs)*60);
  return hrs + 'h ' + (mins < 10 ? '0'+mins : mins) + 'm';
}

var pinBuffer = '';
var PIN_UNLOCKED = false;

function pinPress(val) {
  if (val === 'cancel') { closePinOverlay(); return; }
  if (val === 'back') {
    pinBuffer = pinBuffer.slice(0,-1);
    updatePinDots();
    return;
  }
  if (pinBuffer.length >= 4) return;
  pinBuffer += val;
  updatePinDots();
  if (pinBuffer.length === 4) {
    setTimeout(function(){ checkPin(); }, 120);
  }
}
function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('pd'+i);
    if (dot) dot.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}
function checkPin() {
  var stored = state.pin;
  if (!stored) {
    // First time - set PIN
    state.pin = pinBuffer;
    saveState(state);
    PIN_UNLOCKED = true;
    closePinOverlay();
    document.getElementById('pinError').textContent = '';
    switchTab('private');
  } else if (pinBuffer === stored) {
    PIN_UNLOCKED = true;
    closePinOverlay();
    document.getElementById('pinError').textContent = '';
    switchTab('private');
  } else {
    document.getElementById('pinError').textContent = 'Wrong PIN';
    pinBuffer = '';
    updatePinDots();
  }
}
function closePinOverlay() {
  pinBuffer = '';
  updatePinDots();
  var ov = document.getElementById('pinOverlay');
  if (ov) ov.className = 'secret-overlay hidden';
}
function openPinOverlay() {
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pinError').textContent = state.pin ? '' : 'First time: set a 4-digit PIN';

}

function rolloverTodos() {
  var today = todayKey();
  var changed = false;
  var carryOver = [];
  Object.keys(state.todos).forEach(function(k) {
    if (k >= today) return;
    (state.todos[k] || []).forEach(function(t) {
      if (!t.done) carryOver.push({ text: t.text, done: false });
    });
    delete state.todos[k];
    changed = true;
  });
  if (carryOver.length) {
    if (!state.todos[today]) state.todos[today] = [];
    carryOver.forEach(function(t) { state.todos[today].push(t); });
    changed = true;
  }
  if (changed) saveState(state);
}

function toggleTodo(i) {

// ── CALENDAR ──
var calYear, calMonth;
(function(){var n=new Date(); calYear=state.calView?state.calView.year:n.getFullYear(); calMonth=state.calView?state.calView.month:n.getMonth();})();

function changeMonth(dir) {
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;}
  state.calView={year:calYear,month:calMonth}; saveState(state); renderCalendar();
}

function renderCalendar() {
  var now=new Date(); now.setHours(0,0,0,0);
  var monthName=new Date(calYear,calMonth,1).toLocaleString('en',{month:'long'});
  var daysInMon=new Date(calYear,calMonth+1,0).getDate();
  var firstDay=new Date(calYear,calMonth,1).getDay();
  document.getElementById('calMonthTitle').textContent=monthName+' '+calYear;
  var cells=[];
  for(var i=0;i<firstDay;i++) cells.push(null);
  for(var d=1;d<=daysInMon;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  var weeks=[]; for(var i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));
  var prodCount=0;
  for(var d=1;d<=daysInMon;d++){
    var key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(isProductive(state.days[key])) prodCount++;
  }
  document.getElementById('calendarContent').innerHTML=weeks.map(function(week,wi){
    var days=week.map(function(d){
      if(!d) return '<div class="day-dot empty"></div>';
      var date=new Date(calYear,calMonth,d); date.setHours(0,0,0,0);
      var key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var entry=state.days[key], isToday=date.getTime()===now.getTime(), isFut=date>now;
      var cls='day-dot';
      if(isFut) cls+=' future';
      else if(isProductive(entry)) cls+=' productive';
      else if(isPartial(entry)) cls+=' partial';
      if(isToday) cls+=' today';
      return '<div class="'+cls+'">'+d+'</div>';
    }).join('');
    return '<div class="week-row"><span class="week-label">W'+(wi+1)+'</span>'+days+'</div>';
  }).join('');
  document.getElementById('calProdCount').textContent=prodCount+' productive day'+(prodCount!==1?'s':'')+' this month';
  var ms = getMonthHabitStats(calYear, calMonth);
  var statsEl = document.getElementById('calMonthStats');
  if (statsEl) {
    var statCard = function(emoji, title, count) {
      return '<div class="cal-stat-card"><div class="cal-stat-title">'+emoji+' '+title+'</div>'+
        '<div class="cal-stat-val">'+count+' / '+ms.days+' days</div></div>';
    };
    statsEl.innerHTML =
      '<div class="section-title" style="margin-top:16px;margin-bottom:10px;">Monthly Habit Log — '+monthName+'</div>'+
      '<div class="cal-month-stats">'+
        statCard('🚫','No Porn', ms.noPorn)+
        statCard('🍬','No Sugar', ms.noSugar)+
        statCard('🍔','No Junk', ms.noJunk)+
        statCard('🏃','30 min Run', ms.run)+
      '</div>';
  }
}

function renderHistory(){
  var entries=Object.keys(state.days).map(function(k){return [k, state.days[k]];})
    .filter(function(p){var e=p[1];return e.ts||Object.keys(e.checks||{}).map(function(_k){return e.checks||{}[_k];}).some(Boolean);})
    .sort(function(a,b){return b[0].localeCompare(a[0]);}).slice(0,30);
  if(!entries.length){document.getElementById('historyContent').innerHTML='<div class="no-history">No entries yet. Log your first day!</div>';return;}
  document.getElementById('historyContent').innerHTML=entries.map(function(pair){
    var key=pair[0],entry=pair[1];
    var date=new Date(key+'T00:00:00');
    var dateStr=date.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
    var doneChecks=CHECKS.filter(function(c){return entry.checks&&entry.checks[c.id];});
    var d=entry.diary||{}, prod=isProductive(entry);
    return '<div class="history-entry">'+
      '<div class="history-date">'+dateStr+(prod?' 🏆':'')+'</div>'+
      '<div class="history-checks">'+
        doneChecks.map(function(c){return '<span class="history-chip">'+c.emoji+' '+c.name+'</span>';}).join('')+
        (doneChecks.length?'':'<span style="font-size:10px;color:var(--muted)">No checks</span>')+
      '</div>'+
      (d.word?'<div class="history-note">📖 <b>'+d.word+'</b></div>':'')+
      (d.learned?'<div class="history-note">💡 '+d.learned+'</div>':'')+
      (d.missed?'<div class="history-note" style="color:#e0a0a0">❌ '+d.missed+'</div>':'')+
      (d.plan?'<div class="history-note">📅 '+d.plan+'</div>':'')+
    '</div>';
  }).join('');
}

function getAllCategories() {
  var custom = (state.customCategories || []).map(function(c) {
    return { id: c.id, label: c.label, emoji: c.emoji || '🏷️', color: c.color || '#888', custom: true };
  });
  return BASE_EXPENSE_CATEGORIES.concat(custom);
}

function getCategoryById(id) {
  var all = getAllCategories();
  for (var i = 0; i < all.length; i++) {
    if (all[i].id === id) return all[i];
  }
  return { id: id, label: id, emoji: '📦', color: '#666' };
}

function currentMonthKey() {
  var n = new Date();
  return n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0');
}

function dateToKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function getWeekStartKey() {
  var n = new Date();
  n.setHours(0, 0, 0, 0);
  n.setDate(n.getDate() - n.getDay());
  return dateToKey(n);
}

function getMonthStartKey() {
  return currentMonthKey() + '-01';
}

function getExpenseDateRange(range) {
  var today = todayKey();
  if (range === 'today') return { start: today, end: today, label: 'Today' };
  if (range === 'week') return { start: getWeekStartKey(), end: today, label: 'This Week' };
  if (range === 'month') return { start: getMonthStartKey(), end: today, label: 'This Month' };
  return { start: null, end: null, label: 'All Time' };
}

function expenseEntryKey(e) {
  return (e.cat || '') + '|' + (e.amount || 0) + '|' + (e.time || '') + '|' + (e.note || '');
}

function archiveExpenseEntry(dateKey, entry) {
  if (!state.expenseArchive) state.expenseArchive = [];
  var key = dateKey + '|' + expenseEntryKey(entry);
  var exists = false;
  state.expenseArchive.forEach(function(item) {
    if (item.key === key) exists = true;
  });
  if (!exists) state.expenseArchive.push({ key: key, dateKey: dateKey, entry: entry });
}

function backfillExpenseArchive() {
  if (!state.expenses) return;
  if (!state.expenseArchive) state.expenseArchive = [];
  Object.keys(state.expenses).forEach(function(dateKey) {
    (state.expenses[dateKey] || []).forEach(function(entry) {
      archiveExpenseEntry(dateKey, entry);
    });
  });
}

function rebuildExpensesFromArchive() {
  if (!state.expenseArchive || !state.expenseArchive.length) return;
  if (!state.expenses) state.expenses = {};
  var changed = false;
  state.expenseArchive.forEach(function(item) {
    if (!item.dateKey || !item.entry) return;
    if (!state.expenses[item.dateKey]) state.expenses[item.dateKey] = [];
    var exists = false;
    state.expenses[item.dateKey].forEach(function(e) {
      if (expenseEntryKey(e) === expenseEntryKey(item.entry)) exists = true;
    });
    if (!exists) {
      state.expenses[item.dateKey].push(item.entry);
      changed = true;
    }
  });
  if (changed) saveState(state);
}

function mergeExpenseLogs(localExp, remoteExp) {
  localExp = localExp || {};
  remoteExp = remoteExp || {};
  var merged = {};
  var keys = {};
  Object.keys(localExp).forEach(function(k) { keys[k] = 1; });
  Object.keys(remoteExp).forEach(function(k) { keys[k] = 1; });
  Object.keys(keys).forEach(function(k) {
    var seen = {};
    var list = [];
    (remoteExp[k] || []).concat(localExp[k] || []).forEach(function(e) {
      var id = expenseEntryKey(e);
      if (!seen[id]) { seen[id] = 1; list.push(e); }
    });
    if (list.length) merged[k] = list;
  });
  return merged;
}

function mergeExpenseArchive(localArc, remoteArc) {
  localArc = localArc || [];
  remoteArc = remoteArc || [];
  var map = {};
  remoteArc.concat(localArc).forEach(function(item) {
    if (item && item.key) map[item.key] = item;
  });
  var out = [];
  Object.keys(map).forEach(function(k) { out.push(map[k]); });
  return out;
}

function mergeFriends(localFriends, remoteFriends) {
  var map = {};
  (remoteFriends || []).forEach(function(n) { if (n) map[n] = 1; });
  (localFriends || []).forEach(function(n) { if (n) map[n] = 1; });
  return Object.keys(map);
}

function mergeCustomCategories(localCats, remoteCats) {
  var map = {};
  (remoteCats || []).concat(localCats || []).forEach(function(c) {
    if (c && c.id) map[c.id] = c;
  });
  return Object.keys(map).map(function(k) { return map[k]; });
}

function getAllExpenseRows(range) {
  if (!state.expenses) return [];
  var dr = getExpenseDateRange(range || (state.moneyView && state.moneyView.range) || 'month');
  var rows = [];
  Object.keys(state.expenses).sort().reverse().forEach(function(dateKey) {
    if (dr.start && dateKey < dr.start) return;
    if (dr.end && dateKey > dr.end) return;
    (state.expenses[dateKey] || []).forEach(function(e, i) {
      rows.push({ dateKey: dateKey, idx: i, entry: e });
    });
  });
  return rows;
}

function filterExpenseRows(rows, query) {
  if (!query) return rows;
  var q = query.toLowerCase().trim();
  if (!q) return rows;
  return rows.filter(function(row) {
    var e = row.entry;
    var cat = getCategoryById(e.cat);
    var hay = cat.label + ' ' + e.cat + ' ' + (e.note || '') + ' ' + row.dateKey + ' ' + e.amount + ' ' + expenseMyAmount(e);
    if (e.split && e.split.with) hay += ' ' + e.split.with.join(' ');
    if (e.split && e.split.owed) {
      e.split.owed.forEach(function(o) { hay += ' ' + o.name + ' ' + o.amount; });
    }
    return hay.toLowerCase().indexOf(q) !== -1;
  });
}

function expenseMyAmount(e) {
  if (e && e.split && e.split.enabled && typeof e.split.myShare === 'number') return e.split.myShare;
  return e.amount || 0;
}

function getCategoryTotal(rows, catId) {
  return rows.filter(function(r) { return r.entry.cat === catId; })
    .reduce(function(sum, r) { return sum + expenseMyAmount(r.entry); }, 0);
}

function getSplitBalances() {
  var balances = {};
  if (!state.expenses) return balances;
  Object.keys(state.expenses).forEach(function(dateKey) {
    (state.expenses[dateKey] || []).forEach(function(e) {
      if (!e.split || !e.split.enabled || !e.split.owed) return;
      e.split.owed.forEach(function(o) {
        if (!balances[o.name]) balances[o.name] = 0;
        balances[o.name] += o.amount || 0;
      });
    });
  });
  return balances;
}

function renderSplitInputs() {
  var area = document.getElementById('splitInputsArea');
  var splitCb = document.getElementById('expSplit');
  if (!area || !splitCb || !splitCb.checked) return;
  var modeEl = document.getElementById('splitMode');
  var mode = modeEl ? modeEl.value : 'equal';
  var includeMe = document.getElementById('splitIncludeMe') ? document.getElementById('splitIncludeMe').checked : true;
  var selected = getSelectedSplitFriends();
  var amt = +((document.getElementById('expAmount') || {}).value || 0);
  var readOnly = mode === 'equal' ? 'readonly' : '';
  var html = '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:8px 0 6px;">Split breakdown</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 70px 90px;gap:6px;font-size:10px;color:var(--muted);margin-bottom:4px;"><span>Name</span><span>%</span><span>Rs</span></div>';
  if (includeMe) {
    html += '<div style="display:grid;grid-template-columns:1fr 70px 90px;gap:6px;align-items:center;margin-bottom:6px;">' +
      '<span style="font-size:12px;">Me</span>' +
      '<input id="split-my-pct" type="number" step="0.1" ' + readOnly + ' style="background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px;outline:none;" oninput="updateSplitPreview()">' +
      '<input id="split-my-amt" type="number" step="0.01" ' + readOnly + ' style="background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px;outline:none;" oninput="updateSplitPreview()">' +
    '</div>';
  }
  selected.forEach(function(f) {
    html += '<div style="display:grid;grid-template-columns:1fr 70px 90px;gap:6px;align-items:center;margin-bottom:6px;">' +
      '<span style="font-size:12px;">' + f.name + '</span>' +
      '<input id="split-pct-' + f.idx + '" type="number" step="0.1" ' + readOnly + ' style="background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px;outline:none;" oninput="updateSplitPreview()">' +
      '<input id="split-amt-' + f.idx + '" type="number" step="0.01" ' + readOnly + ' style="background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px;outline:none;" oninput="updateSplitPreview()">' +
    '</div>';
  });
  area.innerHTML = html;
  if (mode === 'equal' && amt > 0) applyEqualSplit(amt);
}

function applyEqualSplit(totalAmount) {
  var includeMe = document.getElementById('splitIncludeMe') ? document.getElementById('splitIncludeMe').checked : true;
  var selected = getSelectedSplitFriends();
  var n = selected.length + (includeMe ? 1 : 0);
  if (!n || !totalAmount) return;
  var per = Math.round(totalAmount / n * 100) / 100;
  var pct = Math.round(10000 / n) / 100;
  if (includeMe) {
    var myPct = document.getElementById('split-my-pct');
    var myAmt = document.getElementById('split-my-amt');
    if (myPct) myPct.value = pct;
    if (myAmt) myAmt.value = per;
  }
  selected.forEach(function(f) {
    var p = document.getElementById('split-pct-' + f.idx);
    var a = document.getElementById('split-amt-' + f.idx);
    if (p) p.value = pct;
    if (a) a.value = per;
  });
}

function calcSplitAmounts(totalAmount) {
  var includeMe = document.getElementById('splitIncludeMe') ? document.getElementById('splitIncludeMe').checked : true;
  var selected = getSelectedSplitFriends();
  if (!selected.length) return { ok: false, msg: 'Select at least one friend' };
  var modeEl = document.getElementById('splitMode');
  var mode = modeEl ? modeEl.value : 'equal';
  if (mode === 'equal') {
    applyEqualSplit(totalAmount);
  }
  var friendTotal = 0;
  var owed = [];
  selected.forEach(function(f) {
    var amtEl = document.getElementById('split-amt-' + f.idx);
    var pctEl = document.getElementById('split-pct-' + f.idx);
    var amt = amtEl && amtEl.value ? +amtEl.value : 0;
    var pct = pctEl && pctEl.value ? +pctEl.value : 0;
    if (amt <= 0 && pct > 0) amt = Math.round(totalAmount * pct / 100 * 100) / 100;
    if (pct <= 0 && amt > 0 && totalAmount) pct = Math.round(amt / totalAmount * 1000) / 10;
    owed.push({ name: f.name, amount: amt, pct: pct });
    friendTotal += amt;
  });
  var myShare = 0;
  var myPct = 0;
  if (includeMe) {
    var myAmtEl = document.getElementById('split-my-amt');
    var myPctEl = document.getElementById('split-my-pct');
    myShare = myAmtEl && myAmtEl.value ? +myAmtEl.value : 0;
    myPct = myPctEl && myPctEl.value ? +myPctEl.value : 0;
    if (myShare <= 0 && myPct > 0) myShare = Math.round(totalAmount * myPct / 100 * 100) / 100;
    if (myPct <= 0 && myShare > 0 && totalAmount) myPct = Math.round(myShare / totalAmount * 1000) / 10;
  }
  var sum = Math.round((friendTotal + myShare) * 100) / 100;
  var target = Math.round(totalAmount * 100) / 100;
  if (Math.abs(sum - target) > 0.05) {
    return { ok: false, msg: 'Split total Rs ' + sum.toFixed(2) + ' must equal Rs ' + target.toFixed(2) };
  }
  return {
    ok: true,
    myShare: myShare,
    myPct: myPct,
    owed: owed,
    with: selected.map(function(f) { return f.name; }),
    includeMe: includeMe,
    mode: mode
  };
}

function updateSplitPreview() {
  var prev = document.getElementById('splitPreview');
  var validEl = document.getElementById('splitValidation');
  var amountEl = document.getElementById('expAmount');
  var splitCb = document.getElementById('expSplit');
  if (!prev || !amountEl || !splitCb || !splitCb.checked) return;
  var amt = +amountEl.value;
  if (!amt || amt <= 0) {
    prev.textContent = 'Enter amount to see split';
    if (validEl) validEl.textContent = '';
    return;
  }
  var modeEl = document.getElementById('splitMode');
  if (modeEl && modeEl.value === 'equal') applyEqualSplit(amt);
  var calc = calcSplitAmounts(amt);
  if (!calc.ok) {
    prev.textContent = '';
    if (validEl) validEl.textContent = calc.msg;
    return;
  }
  if (validEl) validEl.textContent = 'Split total matches Rs ' + amt.toLocaleString('en-IN');
  prev.textContent = 'Your share: Rs ' + calc.myShare.toLocaleString('en-IN') +
    (calc.owed.length ? ' · ' + calc.owed.map(function(o) {
      return o.name + ' owes Rs ' + o.amount.toLocaleString('en-IN') + (o.pct ? ' (' + o.pct + '%)' : '');
    }).join(' · ') : '');
}

function formatSplitSummary(e) {
  if (!e.split || !e.split.enabled) return '';
  var parts = ['your share Rs ' + (e.split.myShare || 0).toLocaleString('en-IN')];
  if (e.split.with && e.split.with.length) parts.push('split with ' + e.split.with.join(', '));
  if (e.split.mode === 'custom') parts.push('custom split');
  return parts.join(' · ');
}

function renderExpenseAnalysis(rows) {
  var notes = [];
  if (!rows.length) {
    notes.push('No expenses in this view. Try switching to All Time or add a new expense.');
    return notes;
  }
  var total = rows.reduce(function(s, r) { return s + expenseMyAmount(r.entry); }, 0);
  notes.push('Total (your share): Rs ' + total.toLocaleString('en-IN') + ' across ' + rows.length + ' entries.');
  var byCat = {};
  var days = {};
  rows.forEach(function(r) {
    var c = r.entry.cat;
    if (!byCat[c]) byCat[c] = 0;
    byCat[c] += expenseMyAmount(r.entry);
    days[r.dateKey] = 1;
  });
  var topCat = null;
  var topAmt = 0;
  Object.keys(byCat).forEach(function(k) {
    if (byCat[k] > topAmt) { topAmt = byCat[k]; topCat = k; }
  });
  if (topCat) {
    var catInfo = getCategoryById(topCat);
    notes.push('Top category: ' + catInfo.emoji + ' ' + catInfo.label + ' — Rs ' + topAmt.toLocaleString('en-IN') + ' (' + Math.round(topAmt / total * 100) + '% of spend).');
  }
  var dayCount = Object.keys(days).length || 1;
  notes.push('Average Rs ' + Math.round(total / dayCount).toLocaleString('en-IN') + ' per day with spending.');
  getAllCategories().forEach(function(c) {
    var spent = byCat[c.id] || 0;
    var budget = (state.budgets || {})[c.id] || 0;
    if (!budget || !spent) return;
    if (spent > budget) notes.push('Over budget on ' + c.label + ': Rs ' + spent.toLocaleString('en-IN') + ' / Rs ' + budget.toLocaleString('en-IN') + '.');
    else if (spent > budget * 0.85) notes.push('Near budget on ' + c.label + ': ' + Math.round(spent / budget * 100) + '% used.');
  });
  var owedTotal = 0;
  rows.forEach(function(r) {
    if (r.entry.split && r.entry.split.owed) {
      r.entry.split.owed.forEach(function(o) { owedTotal += o.amount || 0; });
    }
  });
  if (owedTotal > 0) notes.push('Friends owe you Rs ' + Math.round(owedTotal).toLocaleString('en-IN') + ' in this period.');
  if (rows.length >= 2) {
    var half = Math.floor(rows.length / 2);
    var recent = rows.slice(0, half).reduce(function(s, r) { return s + expenseMyAmount(r.entry); }, 0);
    var older = rows.slice(half).reduce(function(s, r) { return s + expenseMyAmount(r.entry); }, 0);
    if (recent > older * 1.2) notes.push('Trend: recent entries are spending heavier than earlier ones in this view.');
    else if (recent < older * 0.8) notes.push('Trend: spending is cooling down compared to earlier entries in this view.');
    else notes.push('Trend: spending pace looks steady in this view.');
  }
  return notes;
}

function addExpense() {
  var cat = document.getElementById('expCat');
  var amount = document.getElementById('expAmount');
  var note = document.getElementById('expNote');
  if (!state.expenses) state.expenses = {};
  if (!cat || !amount || !amount.value || isNaN(+amount.value) || +amount.value <= 0) {
    showToast('Enter a valid amount');
    return;
  }
  var k = todayKey();
  if (!state.expenses[k]) state.expenses[k] = [];
  var now = new Date();
  var entry = {
    cat: cat.value,
    amount: +amount.value,
    note: note ? note.value.trim() : '',
    time: now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
  };
  var splitCb = document.getElementById('expSplit');
  if (splitCb && splitCb.checked) {
    var calc = calcSplitAmounts(+amount.value);
    if (!calc.ok) { showToast(calc.msg); return; }
    entry.split = {
      enabled: true,
      with: calc.with,
      includeMe: calc.includeMe,
      myShare: calc.myShare,
      myPct: calc.myPct,
      owed: calc.owed,
      mode: calc.mode
    };
  }
  state.expenses[k].push(entry);
  archiveExpenseEntry(k, entry);
  amount.value = '';
  if (note) note.value = '';
  if (splitCb) splitCb.checked = false;
  saveState(state);
  renderMoney();
  renderFrontMoney();
  showToast('Expense logged');
}

function deleteExpense(dateKey, idx) {
  if (!state.expenses[dateKey]) return;
  state.expenses[dateKey].splice(idx, 1);
  saveState(state);
  renderMoney();
  renderFrontMoney();
}

function saveBudget(catId) {
  var inp = document.getElementById('budget-' + catId);
  if (!state.budgets) state.budgets = {};
  if (!inp || isNaN(+inp.value)) return;
  state.budgets[catId] = +inp.value;
  saveState(state);
  renderMoney();
  showToast('Budget updated');
}

function selectCat(id) {
  var hiddenInput = document.getElementById('expCat');
  if (hiddenInput) hiddenInput.value = id;
  getAllCategories().forEach(function(c) {
    var btn = document.getElementById('catBtn-' + c.id);
    if (!btn) return;
    if (c.id === id) {
      btn.style.background = 'var(--gold)';
      btn.style.color = '#000';
      btn.style.borderColor = 'var(--gold)';
    } else {
      btn.style.background = 'var(--card)';
      btn.style.color = 'var(--text)';
      btn.style.borderColor = 'var(--border)';
    }
  });
}

function toggleBudgetSettings() {
  var d = document.getElementById('budgetSettings');
  var t = document.getElementById('budgetToggle');
  if (!d) return;
  if (d.style.display === 'none') { d.style.display = 'block'; if (t) t.textContent = '-'; }
  else { d.style.display = 'none'; if (t) t.textContent = '+'; }
}

function switchTab(id){
  closeThemePopover();
  if(id==='private'){
    if(!PIN_UNLOCKED){ openPinOverlay(); return; }
    renderPrivate();
  }
  currentSection = id;
  var home = document.getElementById('homeScreen');
  if (home) home.style.display = 'none';
  var allTabs=['today','calendar','goals','body','tapan','money','private','history'];
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',allTabs[i]===id);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  var panel=document.getElementById('panel-'+id);
  if(panel) panel.classList.add('active');
  if(id==='calendar') renderCalendar();
  if(id==='goals')    renderGoals();
  if(id==='body')     renderBody();
  if(id==='tapan')    renderTapan();
  if(id==='money')    renderMoney();
  if(id==='history')  renderHistory();
  if(id==='today')    { renderChecklist(); loadSleepForm(); renderSleepDisplay(); renderTodoWidget(); }
}

function showToast(msg){
  var el=document.getElementById('toast');
  if(!el) return;
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2400);
}

function loadRemote() {
  if (!currentUser) return;
  showSync('Syncing...');
  db.collection('users').doc(currentUser.uid).get()
    .then(function(doc) {
      if (doc.exists && doc.data() && doc.data().data) {
        var remote = doc.data().data;
        var local = loadState();
        remote.pin = local.pin || remote.pin || '';
        remote.calView = local.calView || remote.calView || null;
        if (!remote.days)      remote.days      = {};
        if (!remote.goals)     remote.goals     = { bodyfat:0, usa:false };
        if (!remote.weightLog) remote.weightLog = [];
        if (!remote.bfLog)     remote.bfLog     = [];
        if (!remote.tapanLog)  remote.tapanLog  = [];
        if (!remote.todos)     remote.todos     = {};
        if (!remote.sleep)     remote.sleep     = {};
        if (!remote.private)   remote.private   = {};
        if (!remote.expenses)  remote.expenses  = {};
        if (!remote.budgets)   remote.budgets   = { rent: 15000, electricity: 1500, food: 8000, maid: 2000, laundry: 1000, commute: 2000, cafe: 2000, recharge: 500, shopping: 3000, other: 2000, creditcard: 10000, tickets: 2000, sip: 10000, parents: 10000 };
        if (!remote.friends)   remote.friends   = [];
        if (!remote.customCategories) remote.customCategories = [];
        if (!remote.expenseArchive) remote.expenseArchive = [];
        if (!remote.moneyView) remote.moneyView = { range: 'month', search: '' };
        remote.expenses = mergeExpenseLogs(local.expenses, remote.expenses);
        remote.friends = mergeFriends(local.friends, remote.friends);
        remote.expenseArchive = mergeExpenseArchive(local.expenseArchive, remote.expenseArchive);
        remote.customCategories = mergeCustomCategories(local.customCategories, remote.customCategories);
        remote.moneyView = local.moneyView || remote.moneyView || { range: 'month', search: '' };
        remote.appearance = local.appearance || remote.appearance || { mode: 'dark', accent: 'gold' };
        if (local.budgets) {
          remote.budgets = remote.budgets || {};
          Object.keys(local.budgets).forEach(function(k) {
            if (!remote.budgets[k] && local.budgets[k]) remote.budgets[k] = local.budgets[k];
          });
        }
        backfillExpenseArchive();
        rebuildExpensesFromArchive();
        state = remote;
        applyAppearance();
        saveState(state);
        renderAll();
        if (currentSection === 'home') goHome();
        else switchTab(currentSection);
        showSync('Up to date');
      } else {
        saveState(state);
        showSync('Data uploaded');
      }
    })
    .catch(function(){ showSync('Offline'); });
}

function showSync(msg) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  el.style.display = 'block';
  el.textContent = (msg === 'Synced' || msg === 'Up to date' || msg === 'Data uploaded')
    ? 'Synced ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})
    : msg;
  if (msg !== 'Syncing...') {
    setTimeout(function(){ el.style.display = 'none'; }, 3000);
  }
}

function signIn() {
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  auth.signInWithPopup(provider)
    .then(function(result) {
      showToast('Signed in!');
    })
    .catch(function(err) {
      showToast('Error: ' + err.code);
      console.error('Auth error:', err);
    });
}

function signOut() {
  auth.signOut().then(function(){
    currentUser = null;
    document.getElementById('loginBtn').style.display = 'block';
    document.getElementById('userBadge').style.display = 'none';
    showToast('Signed out');
  });
}

function renderAll() {
  renderHero(); renderMiniGoals(); renderChecklist();
  loadSleepForm(); renderSleepDisplay(); renderTodoWidget(); renderFrontTodo(); renderFrontMoney();
  if (currentSection === 'home') goHome();
}

function requestNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(function(permission) {
      if (permission === 'granted') {
        showToast('Notifications enabled!');
        scheduleReminders();
      }
    });
  } else if (Notification.permission === 'granted') {
    scheduleReminders();
  }
}

function sendNotification(title, body) {
  if (Notification.permission !== 'granted') return;
  new Notification(title, {
    body: body,
    icon: 'https://aryankhare1225.github.io/discipline-os/icon.png',
    badge: 'https://aryankhare1225.github.io/discipline-os/icon.png'
  });
}

function scheduleReminders() {
  if (window._reminderInterval) clearInterval(window._reminderInterval);
  window._reminderInterval = setInterval(function() {
    var now = new Date();
    var h = now.getHours();
    var m = now.getMinutes();
    var entry = getTodayEntry();
    var doneCount = Object.keys(entry.checks || {}).map(function(k){ return entry.checks[k]; }).filter(Boolean).length;

    // 7:30 AM — log sleep
    if (h === 7 && m === 30) {
      sendNotification('Good morning Aryan!', 'Day ' + daysSinceStart() + ' — log your sleep hours from last night.');
    }
    // 1:00 PM — healthy lunch
    if (h === 13 && m === 0) {
      sendNotification('Lunch time!', 'No junk, no sugar. Roti + dal + sabzi + salad. You know the plan.');
    }
    // 6:00 PM — evening run
    if (h === 18 && m === 0) {
      sendNotification('Evening run time!', 'Get out. 30 mins. Close those fitness rings.');
    }
    // 7:30 PM — healthy dinner
    if (h === 19 && m === 30) {
      sendNotification('Dinner time!', 'No junk, no sugar. Light and clean. You are building a machine.');
    }
    // 9:00 PM — log day reminder
    if (h === 21 && m === 0 && !entry.ts) {
      sendNotification('Log your day Aryan!', doneCount + '/8 checks done. Fill your diary before you sleep.');
    }
    // 10:00 PM — final nudge
    if (h === 22 && m === 0 && doneCount < 6) {
      sendNotification('Still time!', 'Only ' + doneCount + '/8 checks. Need 6 for a productive day.');
    }
  }, 60000);
}

auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    console.log('Auth state: signed in as', user.email);
    document.getElementById('loginBtn').style.display = 'none';
    var badge = document.getElementById('userBadge');
    badge.style.display = 'block';
    badge.textContent = user.displayName ? user.displayName.split(' ')[0] : 'Signed in';
    loadRemote();
  } else {
    currentUser = null;
    document.getElementById('loginBtn').style.display = 'block';
    document.getElementById('userBadge').style.display = 'none';
  }
});

renderQuote();
rolloverTodos();
applyAppearance();
renderThemePopover();
goHome();
requestNotificationPermission();
document.getElementById('loginBtn').style.display = 'block';
</script>
</body>
